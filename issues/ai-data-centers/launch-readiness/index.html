        <h1>Liquidity Happy Hours</h1>
        <p>Civic accountancy for civil discourse.</p>
        <p>A better way to argue about the common good.</p>
        <p>
          When public projects are sold in the name of growth, jobs, innovation, or security, citizens should be able
          to ask: what was promised, who is bound, what evidence proves it, and who pays if the forecast fails?
        </p>
        <p>
          In a polarized time, Liquidity Happy Hours helps citizens turn contested claims into public accounts:
          promises, payment instruments, evidence bands, and the residual claimant left holding the bill.
        </p>
        <p>First issue lab: AI data centers and the public costs of private growth.</p>
        <h2>Three-line method</h2>
        <ul>
          <li>Promise is not payment.</li>
          <li>Growth is not settlement.</li>
          <li>A public bill needs a named payer.</li>
        </ul>
        <h2>Five hearing questions</h2>
        <ol>
          <li>What is being built for this project?</li>
          <li>Who legally promises to pay for it?</li>
          <li>What happens if the project uses only 60 percent of expected load?</li>
          <li>What happens if it exits in year five?</li>
          <li>Who pays if the contract, guarantee, or flexibility claim fails?</li>
        </ol>
        <h2>Language access</h2>
        <p>
          Baseline quick cards are available in English, Spanish, Chinese, Tagalog/Filipino, Vietnamese, Arabic,
          French, Korean, and Portuguese. Local issue labs should add jurisdiction-specific languages using ACS and
          community review.
        </p>
        <h2>Public Beta status</h2>
        <p>
          Public Beta 1. Updated: May 22, 2026, 20:23 EDT. Status: working public review release. Not legal advice.
          Not an expert report. Not a commission-ready evidentiary record. Full launch blocked until resident,
          reporter, supporter/opponent, bot, and source gates pass. Depolarization remains unproven and must be tested.
        </p>
        <h2>Method Source</h2>
        <p>
          Liquidity Happy Hours is a field lab for the civic standard developed in Ars Agentica: public systems should
          make frames visible, claims contestable, and responsibility traceable.
        </p>
